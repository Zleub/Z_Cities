name: Build and Release Gradle Artifact

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Gradle task to run"
        required: true
        default: "build"
      release_tag:
        description: "Release tag, for example v1.2.3"
        required: true
      artifact_path:
        description: "Path to the built file to publish"
        required: true
        default: "build/libs/app.jar"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Run selected Gradle task
        run: ./gradlew ${{ github.event.inputs.task }}

      - name: Verify artifact exists
        run: |
          test -f "${{ github.event.inputs.artifact_path }}"

      - name: Prepare artifact metadata
        id: meta
        run: |
          FILE_NAME="$(basename "${{ github.event.inputs.artifact_path }}")"
          echo "artifact_name=$FILE_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: ${{ github.event.inputs.artifact_path }}
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download workflow artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: dist

      - name: Create release and upload asset
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.release_tag }}
          ASSET_NAME: ${{ needs.build.outputs.artifact_name }}
        run: |
          gh release create "$TAG" \
            "dist/$ASSET_NAME" \
            --title "$TAG" \
            --generate-notes